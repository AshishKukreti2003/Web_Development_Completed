<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries</title>
    <style>
        .box{
            background-color: red;
            color: black;
            font-size: 72px;
            text-align: center;
            display: none;
        }
        @media (max-width:500px){
            #box-1{
                display: block;
                background-color: aqua;
            }
        }

        @media (min-width:300px) and (max-width:500px){
            #box-2{
                display: block;
                background-color: blue;
            }
        }

        @media (min-width:500px) and (max-width:800px){
            #box-3{
                display: block;
                background-color: green;
            }
        }

        @media (min-width:700px) and (max-width:1000px){
            #box-4{
                display: block;
                background-color: yellow;
            }
        }
    </style>
</head>
<body>
    <div class="box" id="box-1">Mai ek iPhone hu</div>
    <div class="box" id="box-2">Mai ek Tablet hu</div>
    <div class="box" id="box-3">Mai ek computer hu</div>
    <div class="box" id="box-4">Mai ek widescreen computer hu</div>
</body>
</html>
