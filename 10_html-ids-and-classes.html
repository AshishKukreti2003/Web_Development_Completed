<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ids and Classes</title>
</head>
<body>
    <h3>Ids and classes Tutorial</h3>
    <div id="mainBox" class="redBg blackBorder">
        this is mainBox
    </div>
    <span class="redBg"></span>
    <!-- Select and press  ctrl + / to comment -->
    <!-- Emet -->
    <!-- . is for class and # is for id -->
    <!-- span.redBg press enter for class -->
    <span class="redBg"></span>
    <!-- span#mainSpan press enter for class -->
    <span id="mainSpan"></span>
    <!-- div.redBg.blackBoreder>another press enter -->
    <div class="redBg blackBorder anotehrClass"></div>
    <!-- Emet takes div tag as default -->
    <!-- .blackBakground -->
    <div class="blackBackground"></div>

    <!-- creating multiple Elements using Emet -->
    <!-- span.myClass.myClass2.myClass3*4 + <Tab> to print 4 similar elements using emet-->
    <span class="myClass myClass2 myClass3">First</span>
    <span class="myClass myClass2 myClass3">Second</span>
    <span class="myClass myClass2 myClass3">Third</span>
    <span class="myClass myClass2 myClass3">Fourth</span>

</body>
</html>
